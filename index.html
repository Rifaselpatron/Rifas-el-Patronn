<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifas el Patrón</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#0f0026,#000);
color:white;
}
.container{max-width:500px;margin:auto;padding:10px;}
.logo{text-align:center;font-size:30px;color:gold;margin:20px 0;}
.card{background:#111;padding:15px;margin:15px 0;border-radius:15px;}
.btn{width:100%;padding:15px;border:none;border-radius:10px;margin-top:10px;cursor:pointer;}
.btn-gold{background:gold;}
.btn-green{background:#00ff88;}
input{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;}
img{width:100%;border-radius:12px;margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<div class="logo">🎰 Rifas el Patrón</div>

<div class="card">
<h3>🚗 Troca 4x4</h3>
<input id="num" placeholder="Número 1-1000">
<button class="btn btn-gold" onclick="sel()">Seleccionar</button>
</div>

<div class="card">
<h3>👤 Datos</h3>
<input id="nombre" placeholder="Nombre">
</div>

<div class="card">
<h3>📤 Comprobante</h3>
<input type="file" id="file">
<button class="btn btn-green" onclick="ok()">Confirmar</button>
</div>

</div>

<script>
let n=null;

function sel(){
let v=document.getElementById("num").value;
if(!v||v<1||v>1000){alert("Número inválido");return;}
n=v;
alert("Número: "+v);
}

function ok(){
if(!n || !document.getElementById("nombre").value || !document.getElementById("file").files.length){
alert("Falta información");
return;
}
alert("Compra registrada 🎉");
}
</script>

</body>
</html>
